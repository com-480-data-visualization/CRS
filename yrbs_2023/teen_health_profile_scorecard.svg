  <text x="36" y="308" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Breakfast all 7 days</text>
  <rect x="360" y="293" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="293" width="142.69" height="16" rx="7" fill="#2A9D8F"/>
  <text x="930" y="308" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">27.44%</text>
  <text x="36" y="336" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Obesity</text>
  <rect x="360" y="321" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="321" width="82.94" height="16" rx="7" fill="#2A9D8F"/>
  <text x="930" y="336" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">15.95%</text>
  <text x="36" y="382" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#E9A03B">Safety / Support</text>
  <text x="36" y="406" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Bullied at school</text>
  <rect x="360" y="391" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="391" width="100.05" height="16" rx="7" fill="#E9A03B"/>
  <text x="930" y="406" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">19.24%</text>
  <text x="36" y="434" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Unstable housing</text>
  <rect x="360" y="419" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="419" width="17.16" height="16" rx="7" fill="#E9A03B"/>
  <text x="930" y="434" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">3.30%</text>
  <text x="36" y="462" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Basic needs met</text>
  <rect x="360" y="447" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="447" width="448.66" height="16" rx="7" fill="#E9A03B"/>
  <text x="930" y="462" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">86.28%</text>
  <text x="36" y="508" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#457B9D">Substance Use</text>
  <text x="36" y="532" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Current tobacco or EVP use</text>
  <rect x="360" y="517" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="517" width="93.29" height="16" rx="7" fill="#457B9D"/>
  <text x="930" y="532" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">17.94%</text>
  <text x="36" y="560" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Current alcohol use</text>
  <rect x="360" y="545" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="545" width="114.92" height="16" rx="7" fill="#457B9D"/>
  <text x="930" y="560" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">22.10%</text>
  <text x="36" y="588" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1F2933">Current marijuana use</text>
  <rect x="360" y="573" width="520" height="16" rx="7" fill="#E8ECF1"/>
  <rect x="360" y="573" width="88.35" height="16" rx="7" fill="#457B9D"/>
  <text x="930" y="588" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1F2933">16.99%</text>
  <text x="36" y="642" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#7B8794">Source: yrbs2023_readable.csv via teen_health_profile_analysis.py and survey weights in WEIGHT.</text>
</svg>
